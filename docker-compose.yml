services:
  mariadb:
    image: yobasystems/alpine-mariadb:10.6.11
    container_name: toolshop-mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=toolshop
      - MYSQL_DATABASE=toolshop
      - MYSQL_USER=toolshop
      - MYSQL_PASSWORD=toolshop
    ports:
      - "3306:3306"

  api:
    image: testsmith/practice-software-testing-${SPRINT}-api
    container_name: toolshop-api
    depends_on:
      - mariadb
    ports:
      - "8091:8091"

  ui:
    image: testsmith/practice-software-testing-${SPRINT}-ui
    container_name: toolshop-ui
    depends_on:
      - api
    # no need to expose 4200 if you always use the proxy
    # ports:
    #   - "4200:4200"
    environment:
      - API_URL=http://localhost:8080

  web:
    image: testsmith/practice-software-testing-web
    container_name: toolshop-web
    ports:
      - "8081:8081"

  proxy:
    image: nginx:alpine
    container_name: toolshop-proxy
    depends_on:
      - api
      - ui
      - web
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro